<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valentine 💖</title>
  <style>
    :root{
      --bg1:#ff9a9e;
      --bg2:#fad0c4;
      --card:#ffffffcc;
      --text:#2b2b2b;
      --yes:#22c55e;
      --no:#ef4444;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      overflow:hidden;
      color:var(--text);
    }

    .card{
      width:min(520px, 92vw);
      background:var(--card);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.6);
      border-radius:20px;
      padding:28px 22px;
      text-align:center;
      box-shadow: 0 20px 60px rgba(0,0,0,.12);
      position:relative;
    }

    h1{
      margin:0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing:.2px;
    }

    p{
      margin:0 0 18px;
      opacity:.85;
      font-size: 16px;
    }

    .hearts{
      font-size: 28px;
      margin: 10px 0 20px;
      user-select:none;
      animation: float 2.2s ease-in-out infinite;
    }
    @keyframes float{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-8px); }
    }

    .buttons{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:10px;
      position:relative;
      min-height:60px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,.12);
      user-select:none;
      min-width: 120px;
    }
    button:active{ transform: scale(.98); }
    button:hover{ filter: brightness(1.03); transform: translateY(-1px); }

    #yesBtn{
      background: linear-gradient(135deg, #34d399, var(--yes));
      color:white;
    }
    #noBtn{
      background: linear-gradient(135deg, #fb7185, var(--no));
      color:white;
      position:relative;
    }

    .result{
      margin-top:18px;
      font-size:18px;
      font-weight:700;
      min-height: 28px;
    }

    /* Confetti */
    .confetti{
      position:absolute;
      width:10px;
      height:14px;
      top:-20px;
      border-radius:3px;
      opacity:.9;
      animation: fall 1.8s linear forwards;
      pointer-events:none;
    }
    @keyframes fall{
      to{
        transform: translateY(115vh) rotate(720deg);
        opacity:1;
      }
    }

    .footer{
      margin-top:14px;
      font-size: 13px;
      opacity: .7;
    }
  </style>
</head>
<body>

  <div class="card" id="card">
    <div class="hearts">💘 💖 💞</div>
    <h1>Will you be my Valentine?</h1>
    <p>Choose wisely 😄</p>

    <div class="buttons" id="btnArea">
      <button id="yesBtn">Yes 💚</button>
      <button id="noBtn">No 🙈</button>
    </div>

    <div class="result" id="result"></div>
    <div class="footer">Made with ❤️ on GitHub Pages</div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn  = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const btnArea = document.getElementById("btnArea");
    const card = document.getElementById("card");

    function popConfetti(count = 80){
      const colors = ["#22c55e", "#ef4444", "#3b82f6", "#f59e0b", "#a855f7", "#ec4899", "#06b6d4"];
      for(let i=0;i<count;i++){
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.transform = `translateY(0) rotate(${Math.random()*360}deg)`;
        c.style.animationDuration = (1.2 + Math.random()*1.6) + "s";
        c.style.width = (6 + Math.random()*10) + "px";
        c.style.height = (8 + Math.random()*14) + "px";
        document.body.appendChild(c);

        setTimeout(() => c.remove(), 3500);
      }
    }

    yesBtn.addEventListener("click", () => {
      result.textContent = "Yay!! 💖 See you on our Valentine date 😍";
      popConfetti();
      card.style.boxShadow = "0 25px 80px rgba(34,197,94,.25)";
      yesBtn.disabled = true;
      noBtn.disabled = true;
      yesBtn.style.filter = "grayscale(.1)";
      noBtn.style.filter = "grayscale(.5)";
    });

    // Make "No" button dodge the cursor (fun!)
    function moveNoButton(){
      const areaRect = btnArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const padding = 8;
      const maxX = areaRect.width - btnRect.width - padding;
      const maxY = areaRect.height - btnRect.height - padding;

      // If the area is too small, just shake
      if (maxX < 10 || maxY < 10) {
        noBtn.style.transform = "translateX(-6px)";
        setTimeout(()=> noBtn.style.transform="translateX(6px)", 70);
        setTimeout(()=> noBtn.style.transform="translateX(0)", 140);
        return;
      }

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.position = "absolute";
      noBtn.style.left = x + "px";
      noBtn.style.top  = y + "px";
    }

    // Trigger on hover & touch (mobile)
    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });

    // If they manage to click "No"
    noBtn.addEventListener("click", () => {
      result.textContent = "Aww 😅 okay... but are you sure? 💔";
      popConfetti(25);
      moveNoButton();
    });
  </script>
</body>
</html>
