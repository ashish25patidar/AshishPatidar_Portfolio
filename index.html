<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valentine</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: Arial, sans-serif;
      background:#f5f5f5;
    }

    .card{
      width:min(420px, 92vw);
      background:#fff;
      border:1px solid #ddd;
      border-radius:12px;
      padding:24px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }

    h1{
      margin:0 0 10px;
      font-size:28px;
    }

    p{
      margin:0 0 18px;
      color:#555;
    }

    .buttons{
      position:relative;
      height:70px; /* gives space to move "No" button */
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    button{
      border:none;
      border-radius:10px;
      padding:12px 18px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      min-width:120px;
    }

    #yesBtn{
      background:#22c55e;
      color:#fff;
    }

    #noBtn{
      background:#ef4444;
      color:#fff;
      position:absolute; /* required so it can move */
      left: 55%;
      top: 10px;
    }

    .result{
      margin-top:18px;
      font-size:18px;
      font-weight:700;
      min-height:24px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Will you be my Valentine?</h1>
    <p>Choose one option.</p>

    <div class="buttons" id="btnArea">
      <button id="yesBtn">Yes</button>
      <button id="noBtn" type="button">No</button>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn  = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const btnArea = document.getElementById("btnArea");

    // When user clicks yes
    yesBtn.addEventListener("click", () => {
      result.textContent = "Great. See you soon.";
      yesBtn.disabled = true;
    });

    // Make "No" impossible to click by moving away before click happens
    function moveNoButton(){
      const areaRect = btnArea.getBoundingClientRect();
      const btnRect  = noBtn.getBoundingClientRect();

      const padding = 6;
      const maxX = areaRect.width  - btnRect.width  - padding;
      const maxY = areaRect.height - btnRect.height - padding;

      const x = Math.random() * Math.max(0, maxX);
      const y = Math.random() * Math.max(0, maxY);

      noBtn.style.left = x + "px";
      noBtn.style.top  = y + "px";
    }

    // Run BEFORE click: on mouse enter, move it away
    noBtn.addEventListener("mouseenter", moveNoButton);

    // Mobile: run on touch start so it escapes
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault(); // prevents the tap from becoming a click
      moveNoButton();
    }, { passive: false });

    // Extra safety: even if clicked somehow, do nothing
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton();
    });
  </script>

</body>
</html>
