<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valentine</title>

  <style>
    :root{
      --bg1:#f7f2ef;
      --bg2:#efe6e1;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --yes:#16a34a;
      --no:#b91c1c;
      --ring: rgba(17, 24, 39, 0.12);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% 10%, #ffffff 0%, transparent 55%),
        radial-gradient(900px 450px at 85% 35%, #ffffff 0%, transparent 50%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      padding: 22px;
      overflow:hidden;
    }

    .card{
      width:min(560px, 94vw);
      background:var(--card);
      border-radius:16px;
      border: 1px solid rgba(17,24,39,.08);
      box-shadow:
        0 20px 60px rgba(17,24,39,.12),
        0 2px 12px rgba(17,24,39,.06);
      padding: 30px 26px;
      position:relative;
      overflow:hidden;
      isolation:isolate;
      z-index: 2;
    }

    header{ text-align:center; }

    h1{
      margin:0;
      font-size: clamp(26px, 3.6vw, 40px);
      letter-spacing: .2px;
      font-weight: 760;
    }

    p{
      margin:10px 0 0;
      color:var(--muted);
      font-size: 15.5px;
      line-height: 1.5;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(17,24,39,.14), transparent);
      margin: 18px 0 22px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      position:relative;
      z-index:2;
    }

    button{
      border:1px solid rgba(17,24,39,.10);
      border-radius:12px;
      padding: 12px 18px;
      min-width: 140px;
      font-size:16px;
      font-weight: 700;
      cursor:pointer;
      background:#fff;
      color:var(--text);
      box-shadow: 0 10px 20px rgba(17,24,39,.10);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease, border-color .12s ease;
      user-select:none;
      outline:none;
    }

    button:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(17,24,39,.12);
      border-color: rgba(17,24,39,.16);
    }
    button:active{ transform: translateY(0); }
    button:focus-visible{
      box-shadow: 0 0 0 5px var(--ring), 0 14px 26px rgba(17,24,39,.12);
    }

    #yesBtn{
      background: linear-gradient(180deg, #22c55e, var(--yes));
      border-color: rgba(22,163,74,.25);
      color: #fff;
    }

    #noBtn{
      background: linear-gradient(180deg, #ef4444, var(--no));
      border-color: rgba(185,28,28,.25);
      color:#fff;
    }

    .result{
      text-align:center;
      margin-top:18px;
      font-weight:700;
      min-height: 28px;
      position:relative;
      z-index:2;
      color: rgba(17,24,39,.9);
    }

    footer{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      position:relative;
      z-index:2;
    }

    /* Hide helper */
    .hidden{
      display:none !important;
    }

    /* Angry emoji overlay (shown briefly on No) */
    .angry{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: clamp(120px, 18vw, 200px);
      opacity:0;
      transform: scale(.7);
      pointer-events:none;
      z-index:3;
      transition: opacity .18s ease, transform .18s ease;
      filter: drop-shadow(0 18px 24px rgba(0,0,0,.18));
    }
    .angry.show{
      opacity:1;
      transform: scale(1);
    }

    /* Firecracker particles */
    .particle{
      position:absolute;
      border-radius:2px;
      pointer-events:none;
      z-index:4;
      opacity:1;
      transform: translate(-50%, -50%);
      animation: fly var(--dur) cubic-bezier(.1,.8,.2,1) forwards;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
    }

    @keyframes fly{
      0%{
        transform: translate(calc(var(--x0) * 1px), calc(var(--y0) * 1px)) rotate(0deg);
        opacity: 1;
      }
      70%{ opacity: 1; }
      100%{
        transform: translate(calc(var(--x1) * 1px), calc(var(--y1) * 1px)) rotate(720deg);
        opacity: 0;
      }
    }

    .flash{
      position:absolute;
      width:20px;
      height:20px;
      border-radius:50%;
      border:2px solid rgba(17,24,39,.18);
      transform: translate(-50%,-50%) scale(.4);
      opacity:0;
      z-index:4;
      pointer-events:none;
      animation: flash 450ms ease-out forwards;
    }
    @keyframes flash{
      0%   { opacity:.9; transform: translate(-50%,-50%) scale(.4); }
      100% { opacity:0;  transform: translate(-50%,-50%) scale(3.8); }
    }

    /* ===== Custom Modal (Beautiful popup) ===== */
    .modalOverlay{
      position:fixed;
      inset:0;
      background: rgba(17,24,39,.45);
      backdrop-filter: blur(6px);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 999;
    }
    .modalOverlay.show{ display:flex; }

    .modal{
      width:min(560px, 94vw);
      background:#fff;
      border-radius:16px;
      border:1px solid rgba(17,24,39,.10);
      box-shadow: 0 30px 90px rgba(0,0,0,.22);
      overflow:hidden;
      transform: translateY(6px) scale(.98);
      opacity:0;
      animation: modalIn 180ms ease-out forwards;
    }
    @keyframes modalIn{
      to { transform: translateY(0) scale(1); opacity:1; }
    }

    .modalHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(17,24,39,.08);
      background: linear-gradient(180deg, #ffffff, #fbfbfb);
    }
    .modalTitle{
      font-weight: 800;
      letter-spacing: .2px;
    }

    .closeBtn{
      border: none;
      background: transparent;
      cursor: pointer;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display:grid;
      place-items:center;
      font-size: 18px;
      color: rgba(17,24,39,.7);
      box-shadow: none;
      min-width: unset;
      padding: 0;
    }
    .closeBtn:hover{ background: rgba(17,24,39,.06); }
    .closeBtn:focus-visible{ box-shadow: 0 0 0 5px var(--ring); }

    .modalBody{
      padding: 16px;
      line-height: 1.5;
    }
    .modalBody p{
      margin: 0 0 12px;
      color: rgba(17,24,39,.82);
      font-size: 15.5px;
    }

    .countdown{
      margin-top: 6px;
      font-weight: 800;
      color: rgba(17,24,39,.85);
      font-size: 14px;
    }

    .inputWrap{
      margin-top: 10px;
      display:none;
    }
    .inputWrap.show{ display:block; }

    .textInput{
      width:100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(17,24,39,.14);
      outline:none;
      font-size: 15.5px;
      transition: box-shadow .12s ease, border-color .12s ease;
    }
    .textInput:focus{
      border-color: rgba(17,24,39,.28);
      box-shadow: 0 0 0 5px var(--ring);
    }

    .modalFooter{
      padding: 14px 16px 16px;
      display:flex;
      justify-content:flex-end;
      gap:10px;
      border-top: 1px solid rgba(17,24,39,.08);
      background: #fcfcfc;
    }

    .btnGhost{
      background:#fff;
      border:1px solid rgba(17,24,39,.14);
      color: rgba(17,24,39,.85);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
      cursor:pointer;
      min-width: 120px;
      box-shadow: none;
    }
    .btnGhost:hover{ background: rgba(17,24,39,.03); transform: translateY(-1px); }

    .btnPrimary{
      background: linear-gradient(180deg, #22c55e, #16a34a);
      border: 1px solid rgba(22,163,74,.25);
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      min-width: 120px;
      box-shadow: 0 10px 20px rgba(17,24,39,.10);
    }
    .btnPrimary:hover{ transform: translateY(-1px); }

    /* ===== NEW: Happy faces orbit around the page ===== */
    .happyOrbit{
      position:fixed;
      inset:0;
      display:none;
      pointer-events:none;
      z-index: 1; /* behind card, above background */
    }
    .happyOrbit.show{
      display:block;
    }

    .orbitRing{
      position:absolute;
      left:50%;
      top:50%;
      width: 1px;
      height: 1px;
      transform: translate(-50%, -50%);
      animation: spin var(--spinDur) linear infinite;
      opacity: .95;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.15));
    }

    /* each emoji sits on a circle using rotate + translate */
    .orbitEmoji{
      position:absolute;
      left:0;
      top:0;
      transform:
        rotate(var(--angle))
        translateX(var(--radius))
        rotate(calc(var(--angle) * -1));
      font-size: var(--size);
      opacity: var(--op);
    }

    @keyframes spin{
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* second ring spins opposite direction for nicer look */
    .orbitRing.reverse{
      animation-direction: reverse;
      opacity: .85;
    }

    @media (prefers-reduced-motion: reduce){
      .particle, .flash { animation: none !important; }
      .modal { animation: none !important; opacity: 1; transform: none; }
      .orbitRing{ animation: none !important; }
    }
  </style>
</head>

<body>

  <!-- NEW: Happy orbit overlay -->
  <div class="happyOrbit" id="happyOrbit" aria-hidden="true">
    <!-- Ring 1 -->
    <div class="orbitRing" style="--spinDur: 10s;">
      <!-- radius is based on viewport min dimension -->
      <span class="orbitEmoji" style="--angle: 0deg;   --radius: min(42vw, 42vh); --size: 34px; --op: .95;">😊</span>
      <span class="orbitEmoji" style="--angle: 40deg;  --radius: min(42vw, 42vh); --size: 30px; --op: .92;">😄</span>
      <span class="orbitEmoji" style="--angle: 80deg;  --radius: min(42vw, 42vh); --size: 36px; --op: .95;">😁</span>
      <span class="orbitEmoji" style="--angle: 120deg; --radius: min(42vw, 42vh); --size: 28px; --op: .90;">🙂</span>
      <span class="orbitEmoji" style="--angle: 160deg; --radius: min(42vw, 42vh); --size: 34px; --op: .93;">😊</span>
      <span class="orbitEmoji" style="--angle: 200deg; --radius: min(42vw, 42vh); --size: 32px; --op: .92;">😄</span>
      <span class="orbitEmoji" style="--angle: 240deg; --radius: min(42vw, 42vh); --size: 36px; --op: .95;">😁</span>
      <span class="orbitEmoji" style="--angle: 280deg; --radius: min(42vw, 42vh); --size: 28px; --op: .90;">🙂</span>
      <span class="orbitEmoji" style="--angle: 320deg; --radius: min(42vw, 42vh); --size: 34px; --op: .93;">😊</span>
    </div>

    <!-- Ring 2 (reverse) -->
    <div class="orbitRing reverse" style="--spinDur: 14s;">
      <span class="orbitEmoji" style="--angle: 20deg;  --radius: min(32vw, 32vh); --size: 26px; --op: .85;">😊</span>
      <span class="orbitEmoji" style="--angle: 90deg;  --radius: min(32vw, 32vh); --size: 24px; --op: .80;">😄</span>
      <span class="orbitEmoji" style="--angle: 160deg; --radius: min(32vw, 32vh); --size: 26px; --op: .85;">🙂</span>
      <span class="orbitEmoji" style="--angle: 230deg; --radius: min(32vw, 32vh); --size: 24px; --op: .80;">😁</span>
      <span class="orbitEmoji" style="--angle: 300deg; --radius: min(32vw, 32vh); --size: 26px; --op: .85;">😊</span>
    </div>
  </div>

  <div class="card" id="card">
    <div class="angry" id="angryFace">😠</div>

    <!-- Wrap old UI so we can hide it on YES -->
    <div id="questionUI">
      <header>
        <h1>Will you be my Valentine?</h1>
        <p>Please choose one option.</p>
      </header>

      <div class="divider"></div>

      <div class="buttons">
        <button id="yesBtn" type="button">Yes</button>
        <button id="noBtn" type="button">No</button>
      </div>

      <footer>Made with Love</footer>
    </div>

    <!-- Result remains visible -->
    <div class="result" id="result"></div>
  </div>

  <!-- ===== Beautiful Modal ===== -->
  <div class="modalOverlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMsg">
      <div class="modalHeader">
        <div class="modalTitle" id="modalTitle">Notice</div>
        <button class="closeBtn" id="modalClose" type="button" aria-label="Close">✕</button>
      </div>

      <div class="modalBody">
        <p id="modalMsg"></p>
        <div class="countdown" id="countdown" style="display:none;"></div>

        <div class="inputWrap" id="inputWrap">
          <input class="textInput" id="placeInput" type="text" placeholder="Type here..." />
        </div>
      </div>

      <div class="modalFooter">
        <button class="btnGhost" id="modalSecondary" type="button">Close</button>
        <button class="btnPrimary" id="modalPrimary" type="button">Okay</button>
      </div>
    </div>
  </div>

  <script>
    const card  = document.getElementById("card");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn  = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const angry  = document.getElementById("angryFace");
    const questionUI = document.getElementById("questionUI");

    // NEW: Happy orbit overlay
    const happyOrbit = document.getElementById("happyOrbit");

    // Modal elements
    const modalOverlay   = document.getElementById("modalOverlay");
    const modalTitle     = document.getElementById("modalTitle");
    const modalMsg       = document.getElementById("modalMsg");
    const modalClose     = document.getElementById("modalClose");
    const modalPrimary   = document.getElementById("modalPrimary");
    const modalSecondary = document.getElementById("modalSecondary");
    const countdownEl    = document.getElementById("countdown");
    const inputWrap      = document.getElementById("inputWrap");
    const placeInput     = document.getElementById("placeInput");

    let fireworksInterval = null;
    let noFlowTimer = null;
    let refreshTimer = null;
    let countdownTimer = null;
    let lastFocusEl = null;

    function random(min, max){ return Math.random() * (max - min) + min; }

    // Firecrackers (continuous)
    function burstFirecrackers(perBurst = 22){
      const rect = card.getBoundingClientRect();
      const originX = random(rect.width * 0.25, rect.width * 0.75);
      const originY = random(rect.height * 0.20, rect.height * 0.60);

      const ring = document.createElement("div");
      ring.className = "flash";
      ring.style.left = originX + "px";
      ring.style.top  = originY + "px";
      card.appendChild(ring);
      setTimeout(() => ring.remove(), 650);

      const colors = ["#16a34a", "#ef4444", "#2563eb", "#f59e0b", "#a855f7", "#06b6d4", "#111827"];

      for(let i=0; i<perBurst; i++){
        const p = document.createElement("div");
        p.className = "particle";

        p.style.width  = random(6, 12) + "px";
        p.style.height = random(8, 16) + "px";
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.setProperty("--dur", random(900, 1500) + "ms");

        p.style.setProperty("--x0", originX + random(-8, 8));
        p.style.setProperty("--y0", originY + random(-8, 8));

        const angle = random(0, Math.PI * 2);
        const power = random(130, 240);
        const dx = Math.cos(angle) * power;
        const dy = Math.sin(angle) * power + random(60, 160);

        p.style.setProperty("--x1", originX + dx);
        p.style.setProperty("--y1", originY + dy);

        p.style.left = "0px";
        p.style.top  = "0px";

        card.appendChild(p);
        setTimeout(() => p.remove(), 1700);
      }
    }

    function startContinuousFirecrackers(){
      if (fireworksInterval) return;
      burstFirecrackers(40);
      fireworksInterval = setInterval(() => burstFirecrackers(20), 320);
    }

    // NEW: show happy orbit
    function startHappyOrbit(){
      happyOrbit.classList.add("show");
      happyOrbit.setAttribute("aria-hidden", "false");
    }

    // ===== Modal helpers =====
    function openModal({title="Notice", message="", mode="info", primaryText="Okay", secondaryText="Close"}){
      lastFocusEl = document.activeElement;

      modalTitle.textContent = title;
      modalMsg.textContent = message;

      // Reset UI bits
      countdownEl.style.display = "none";
      countdownEl.textContent = "";
      inputWrap.classList.remove("show");
      placeInput.value = "";

      // Buttons
      modalPrimary.textContent = primaryText;
      modalSecondary.textContent = secondaryText;

      // modes: "info" or "prompt"
      if (mode === "prompt") {
        inputWrap.classList.add("show");
      }

      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden", "false");

      setTimeout(() => {
        if (mode === "prompt") placeInput.focus();
        else modalPrimary.focus();
      }, 0);
    }

    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden", "true");
      if (lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
    }

    modalClose.addEventListener("click", closeModal);
    modalSecondary.addEventListener("click", closeModal);

    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modalOverlay.classList.contains("show")) closeModal();
    });

    // ===== Flows =====
    function clearNoFlowTimers(){
      if (noFlowTimer) clearTimeout(noFlowTimer);
      if (refreshTimer) clearTimeout(refreshTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      noFlowTimer = refreshTimer = countdownTimer = null;
    }

    // YES: hide old UI + ask next question + input
    yesBtn.addEventListener("click", () => {
      clearNoFlowTimers();
      angry.classList.remove("show");

      // Hide question and buttons immediately
      questionUI.classList.add("hidden");

      openModal({
        title: "One more question",
        message: "Tell me one place you would love to visit with me on the 14th?",
        mode: "prompt",
        primaryText: "Submit",
        secondaryText: "Cancel"
      });

      // Primary button submits input
      modalPrimary.onclick = () => {
        const place = placeInput.value.trim();
        if (!place) {
          placeInput.focus();
          placeInput.style.borderColor = "rgba(185,28,28,.35)";
          placeInput.style.boxShadow = "0 0 0 5px rgba(185,28,28,.10)";
          setTimeout(() => {
            placeInput.style.borderColor = "rgba(17,24,39,.14)";
            placeInput.style.boxShadow = "none";
          }, 600);
          return;
        }

        closeModal();

        // Show final message on UI
        result.textContent = `Perfect. Lets go to: ${place}`;

        // Start effects
        startContinuousFirecrackers();
        startHappyOrbit();

        // Lock choices (buttons are hidden anyway, but this prevents focus/keyboard)
        yesBtn.disabled = true;
        noBtn.disabled = true;
      };

      // Enter key submits
      placeInput.onkeydown = (ev) => {
        if (ev.key === "Enter") modalPrimary.click();
      };
    });

    // NO: angry for 2s -> popup -> refresh after 5s (no change)
    noBtn.addEventListener("click", () => {
      clearNoFlowTimers();

      angry.classList.add("show");

      noFlowTimer = setTimeout(() => {
        angry.classList.remove("show");

        openModal({
          title: "Okay",
          message: "That's fine. I'll just ask again in 5 seconds",
          mode: "info",
          primaryText: "Okay",
          secondaryText: "Close"
        });

        let remaining = 5;
        countdownEl.style.display = "block";
        countdownEl.textContent = `You have ${remaining} seconds to rethink...`;

        countdownTimer = setInterval(() => {
          remaining -= 1;
          countdownEl.textContent = `You have ${remaining} seconds to rethink...`;
          if (remaining <= 0) clearInterval(countdownTimer);
        }, 1000);

        refreshTimer = setTimeout(() => {
          location.reload();
        }, 5000);

      }, 2000);
    });
  </script>
</body>
</html>
