<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valentine</title>

  <style>
    :root{
      --bg1:#f7f2ef;
      --bg2:#efe6e1;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --yes:#16a34a;
      --no:#b91c1c;
      --ring: rgba(17, 24, 39, 0.12);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% 10%, #ffffff 0%, transparent 55%),
        radial-gradient(900px 450px at 85% 35%, #ffffff 0%, transparent 50%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      padding: 22px;
      overflow:hidden;
    }

    .card{
      width:min(520px, 94vw);
      background:var(--card);
      border-radius:16px;
      border: 1px solid rgba(17,24,39,.08);
      box-shadow:
        0 20px 60px rgba(17,24,39,.12),
        0 2px 12px rgba(17,24,39,.06);
      padding: 30px 26px;
      position:relative;
      overflow:hidden;
      isolation:isolate;
    }

    header{ text-align:center; }

    h1{
      margin:0;
      font-size: clamp(26px, 3.6vw, 40px);
      letter-spacing: .2px;
      font-weight: 760;
    }

    p{
      margin:10px 0 0;
      color:var(--muted);
      font-size: 15.5px;
      line-height: 1.5;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(17,24,39,.14), transparent);
      margin: 18px 0 22px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      position:relative;
      z-index:2;
    }

    button{
      border:1px solid rgba(17,24,39,.10);
      border-radius:12px;
      padding: 12px 18px;
      min-width: 140px;
      font-size:16px;
      font-weight: 700;
      cursor:pointer;
      background:#fff;
      color:var(--text);
      box-shadow: 0 10px 20px rgba(17,24,39,.10);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease, border-color .12s ease;
      user-select:none;
      outline:none;
    }

    button:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(17,24,39,.12);
      border-color: rgba(17,24,39,.16);
    }
    button:active{ transform: translateY(0); }
    button:focus-visible{
      box-shadow: 0 0 0 5px var(--ring), 0 14px 26px rgba(17,24,39,.12);
    }

    #yesBtn{
      background: linear-gradient(180deg, #22c55e, var(--yes));
      border-color: rgba(22,163,74,.25);
      color: #fff;
    }

    #noBtn{
      background: linear-gradient(180deg, #ef4444, var(--no));
      border-color: rgba(185,28,28,.25);
      color:#fff;
    }

    .result{
      text-align:center;
      margin-top:18px;
      font-weight:700;
      min-height: 26px;
      position:relative;
      z-index:2;
    }

    footer{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      position:relative;
      z-index:2;
    }

    /* Angry emoji overlay (hidden by default) */
    .angry{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: clamp(110px, 18vw, 180px);
      opacity:0;
      transform: scale(.6);
      pointer-events:none;
      z-index:1;
      transition: opacity .18s ease, transform .18s ease;
      filter: drop-shadow(0 18px 24px rgba(0,0,0,.18));
    }
    .angry.show{
      opacity:1;
      transform: scale(1);
    }

    /* Firecrackers / confetti particles */
    .particle{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:2px;
      pointer-events:none;
      z-index:3;
      opacity:1;
      transform: translate(-50%, -50%);
      animation: fly var(--dur) cubic-bezier(.1,.8,.2,1) forwards;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
    }

    @keyframes fly{
      0%{
        transform: translate(calc(var(--x0) * 1px), calc(var(--y0) * 1px)) rotate(0deg);
        opacity: 1;
      }
      70%{ opacity: 1; }
      100%{
        transform: translate(calc(var(--x1) * 1px), calc(var(--y1) * 1px)) rotate(720deg);
        opacity: 0;
      }
    }

    /* Small "flash" ring to feel like a cracker */
    .flash{
      position:absolute;
      left:50%;
      top:50%;
      width:20px;
      height:20px;
      border-radius:50%;
      border:2px solid rgba(17,24,39,.18);
      transform: translate(-50%,-50%) scale(.4);
      opacity:0;
      z-index:3;
      pointer-events:none;
      animation: flash 450ms ease-out forwards;
    }
    @keyframes flash{
      0%   { opacity:.9; transform: translate(-50%,-50%) scale(.4); }
      100% { opacity:0;  transform: translate(-50%,-50%) scale(3.8); }
    }
  </style>
</head>

<body>
  <div class="card" id="card">
    <div class="angry" id="angryFace">😠</div>

    <header>
      <h1>Will you be my Valentine?</h1>
      <p>Please choose one option.</p>
    </header>

    <div class="divider"></div>

    <div class="buttons">
      <button id="yesBtn" type="button">Yes</button>
      <button id="noBtn" type="button">No</button>
    </div>

    <div class="result" id="result"></div>
    <footer>Made with care</footer>
  </div>

  <script>
    const card = document.getElementById("card");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn  = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const angry  = document.getElementById("angryFace");

    function random(min, max){ return Math.random() * (max - min) + min; }

    // Firecrackers effect: multi-burst particles originating from the card center
    function firecrackers(bursts = 3, perBurst = 34){
      const rect = card.getBoundingClientRect();
      const originX = rect.width / 2;
      const originY = rect.height / 2;

      // add a flash ring
      const ring = document.createElement("div");
      ring.className = "flash";
      ring.style.left = originX + "px";
      ring.style.top  = originY + "px";
      card.appendChild(ring);
      setTimeout(() => ring.remove(), 600);

      const colors = ["#16a34a", "#ef4444", "#2563eb", "#f59e0b", "#a855f7", "#06b6d4", "#111827"];

      for(let b=0; b<bursts; b++){
        const delay = b * 120;

        setTimeout(() => {
          for(let i=0; i<perBurst; i++){
            const p = document.createElement("div");
            p.className = "particle";

            const size = random(6, 12);
            p.style.width = size + "px";
            p.style.height = random(8, 14) + "px";
            p.style.background = colors[Math.floor(Math.random() * colors.length)];

            // Start near center with slight jitter
            p.style.setProperty("--x0", originX + random(-10, 10));
            p.style.setProperty("--y0", originY + random(-10, 10));

            // End: shoot outward with gravity-ish downward drift
            const angle = random(0, Math.PI * 2);
            const power = random(140, 260);
            const dx = Math.cos(angle) * power;
            const dy = Math.sin(angle) * power + random(70, 150);

            p.style.setProperty("--x1", originX + dx);
            p.style.setProperty("--y1", originY + dy);

            p.style.setProperty("--dur", random(900, 1500) + "ms");

            // Place particle in card coordinate system
            p.style.left = "0px";
            p.style.top  = "0px";

            card.appendChild(p);
            setTimeout(() => p.remove(), 1700);
          }
        }, delay);
      }
    }

    yesBtn.addEventListener("click", () => {
      angry.classList.remove("show");
      result.textContent = "Thank you. Your choice has been recorded.";
      firecrackers(4, 30);

      yesBtn.disabled = true;
      noBtn.disabled = true;
      yesBtn.style.filter = "grayscale(.05)";
      noBtn.style.filter  = "grayscale(.35)";
    });

    noBtn.addEventListener("click", () => {
      // Show big angry emoji
      angry.classList.add("show");
      result.textContent = "";

      // Optional: auto-hide after a moment
      setTimeout(() => angry.classList.remove("show"), 1200);
    });
  </script>
</body>
</html>
